<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Конструктор услуг — ArtPlatform</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --primary: #6366f1;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg-color); padding: 40px 20px; }
        .form-container { max-width: 600px; margin: 0 auto; background: var(--card-bg); padding: 35px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        h2 { margin-bottom: 25px; font-size: 1.6em; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.95em; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 1em; box-sizing: border-box; }
        
        details { background: #fafafa; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 15px; padding: 10px 15px; }
        summary { font-weight: 700; cursor: pointer; outline: none; padding: 5px 0; color: #475569; }
        details[open] summary { border-bottom: 1px dashed var(--border); margin-bottom: 15px; padding-bottom: 10px; }
        
        .dynamic-row { display: table; width: 100%; margin-bottom: 10px; }
        .dynamic-cell { display: table-cell; padding-right: 10px; vertical-align: middle; }
        .dynamic-cell.price { width: 120px; }
        .dynamic-cell.remove-btn-cell { width: 40px; padding-right: 0; text-align: right; }
        
        .dynamic-cell input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        
        .btn-remove { 
            background: none; 
            border: none; 
            color: var(--danger); 
            font-size: 1.5em; 
            font-weight: bold; 
            cursor: pointer; 
            padding: 0 5px; 
            line-height: 1;
            transition: color 0.2s;
        }
        .btn-remove:hover { color: var(--danger-hover); }
        
        .btn-add { background: #f1f5f9; color: var(--text-main); border: 1px solid var(--border); padding: 8px 14px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-top: 5px; font-size: 0.9em; }
        .btn-add:hover { background: #e2e8f0; }
        
        .btn-submit { background: var(--primary); color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 1em; margin-top: 20px; }
        .btn-submit:hover { background: #4f46e5; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Конструктор прайс-листа услуги</h2>
    <form action="/add_service" method="POST">
        
        <div class="form-group">
            <label>Название категории прайса</label>
            <input type="text" name="title" placeholder="Например: Скетч или Полноценный покрас" required>
        </div>

        <details open>
            <summary>Варианты типа арта и цен (Минимум один)</summary>
            <div id="variants-container">
                <div class="dynamic-row">
                    <div class="dynamic-cell"><input type="text" name="variant_title[]" placeholder="Например: Headshot" required></div>
                    <div class="dynamic-cell price"><input type="number" name="variant_price[]" step="0.01" placeholder="5.00" required></div>
                    <div class="dynamic-cell remove-btn-cell"></div>
                </div>
            </div>
            <button type="button" class="btn-add" id="add-variant-btn">+ Добавить еще вариант типа арта</button>
        </details>

        <details>
            <summary>Дополнительные опции (Галочки / Модификаторы)</summary>
            <div id="options-container">
                <div class="dynamic-row">
                    <div class="dynamic-cell"><input type="text" name="option_title[]" placeholder="Например: Добавить сложный фон"></div>
                    <div class="dynamic-cell price"><input type="number" name="option_price[]" step="0.01" placeholder="5.00"></div>
                    <div class="dynamic-cell remove-btn-cell"><button type="button" class="btn-remove" onclick="removeRow(this)">×</button></div>
                </div>
            </div>
            <button type="button" class="btn-add" id="add-option-btn">+ Добавить еще одну галочку</button>
        </details>

        <button type="submit" class="btn-submit">Сохранить и опубликовать</button>
    </form>
</div>

<script>
    function removeRow(button) {
        const row = button.closest('.dynamic-row');
        if (row) {
            row.remove();
        }
    }

    document.getElementById('add-variant-btn').addEventListener('click', () => {
        const container = document.getElementById('variants-container');
        const row = document.createElement('div');
        row.className = 'dynamic-row';
        row.innerHTML = `
            <div class="dynamic-cell"><input type="text" name="variant_title[]" placeholder="Например: HalfBody" required></div>
            <div class="dynamic-cell price"><input type="number" name="variant_price[]" step="0.01" placeholder="10.00" required></div>
            <div class="dynamic-cell remove-btn-cell"><button type="button" class="btn-remove" onclick="removeRow(this)">×</button></div>
        `;
        container.appendChild(row);
    });

    document.getElementById('add-option-btn').addEventListener('click', () => {
        const container = document.getElementById('options-container');
        const row = document.createElement('div');
        row.className = 'dynamic-row';
        row.innerHTML = `
            <div class="dynamic-cell"><input type="text" name="option_title[]" placeholder="Например: Срочный заказ (за 2 дня)"></div>
            <div class="dynamic-cell price"><input type="number" name="option_price[]" step="0.01" placeholder="10.00"></div>
            <div class="dynamic-cell remove-btn-cell"><button type="button" class="btn-remove" onclick="removeRow(this)">×</button></div>
        `;
        container.appendChild(row);
    });
</script>

</body>
</html>
